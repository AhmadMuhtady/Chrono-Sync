		<style>
			.precision-grid {
				background-image: radial-gradient(
					circle at 1px 1px,
					rgba(0, 74, 198, 0.05) 1px,
					transparent 0
				);
				background-size: 40px 40px;
			}
			.glass-card {
				background: rgba(255, 255, 255, 0.6);
				backdrop-filter: blur(16px);
				-webkit-backdrop-filter: blur(16px);
				transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
			}
			.dark .glass-card {
				background: rgba(11, 28, 48, 0.4);
			}
			.glass-card:hover {
				background: rgba(255, 255, 255, 0.85);
				transform: translateY(-4px);
				box-shadow: 0 20px 40px -15px rgba(0, 74, 198, 0.08);
			}
			.digital-glow-primary {
				text-shadow: 0 0 20px rgba(85, 93, 101, 0.15);
			}
			.digital-glow-secondary {
				text-shadow: 0 0 20px rgba(70, 95, 137, 0.15);
			}
			.digital-glow-tertiary {
				text-shadow: 0 0 20px rgba(150, 68, 0, 0.2);
			}
			.flip-unit {
				position: relative;
				width: 5rem;
				height: 7rem;
				font-size: 3rem;
				font-weight: 700;
				perspective: 400px;
			}
			.flip-unit .panel {
				position: absolute;
				left: 0;
				width: 100%;
				height: 3.5rem;
				overflow: hidden;
				display: flex;
				justify-content: center;
			}
			.flip-unit .panel span {
				position: absolute;
				width: 100%;
				height: 7rem;
				line-height: 7rem;
				text-align: center;
			}
			.flip-unit .top {
				top: 0;
				border-radius: 0.25rem 0.25rem 0 0;
				border-bottom: 1px solid rgba(0, 0, 0, 0.2);
			}
			.flip-unit .top span,
			.flip-unit .flap-down span {
				top: 0;
			}
			.flip-unit .bottom {
				bottom: 0;
				border-radius: 0 0 0.25rem 0.25rem;
			}
			.flip-unit .bottom span,
			.flip-unit .flap-up span {
				bottom: 0;
			}
			.flip-unit .flap {
				backface-visibility: hidden;
				z-index: 5;
				opacity: 0;
			}
			.flip-unit .flap-down {
				top: 0;
				border-radius: 0.25rem 0.25rem 0 0;
				border-bottom: 1px solid rgba(0, 0, 0, 0.2);
				transform-origin: bottom;
				transform: rotateX(0);
			}
			.flip-unit .flap-up {
				bottom: 0;
				border-radius: 0 0 0.25rem 0.25rem;
				transform-origin: top;
				transform: rotateX(90deg);
			}
			.flip-unit.flipping .flap-down {
				animation: flipDown 0.28s ease-in forwards;
			}
			.flip-unit.flipping .flap-up {
				animation: flipUp 0.28s ease-out 0.28s forwards;
			}
			@keyframes flipDown {
				0% {
					transform: rotateX(0);
					opacity: 1;
				}
				100% {
					transform: rotateX(-90deg);
					opacity: 1;
				}
			}
			@keyframes flipUp {
				0% {
					transform: rotateX(90deg);
					opacity: 1;
				}
				100% {
					transform: rotateX(0);
					opacity: 1;
				}
			}
			@media (prefers-reduced-motion: reduce) {
				.flip-unit.flipping .flap-down,
				.flip-unit.flipping .flap-up {
					animation: none;
				}
			}
		</style>
