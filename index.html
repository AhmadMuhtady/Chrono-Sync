<!doctype html>
<html class="light" lang="en">
	<head>
		<meta charset="utf-8" />
		<meta content="width=device-width, initial-scale=1.0" name="viewport" />
		<title>Chrono-Sync | Precision Dashboard</title>
		<link
			href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&amp;family=Inter:wght@400;500;700&amp;display=swap"
			rel="stylesheet"
		/>
		<link
			href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@600;700&amp;display=swap"
			rel="stylesheet"
		/>
		<link
			href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
			rel="stylesheet"
		/>
		<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
		<script id="tailwind-config">
			tailwind.config = {
				darkMode: 'class',
				theme: {
					extend: {
						colors: {
							'on-tertiary-container': '#1a1a1a',
							'surface-dim': '#d6d1c9',
							'inverse-surface': '#1a1a1a',
							'on-error-container': '#93000a',
							'secondary-container': '#ffdad6',
							'on-tertiary-fixed': '#1a1a1a',
							primary: '#1a1a1a',
							'on-secondary-container': '#1a1a1a',
							'on-surface': '#1a1a1a',
							'on-primary-fixed-variant': '#1a1a1a',
							'primary-fixed-dim': '#e6b800',
							'tertiary-fixed': '#d6e3ff',
							tertiary: '#0055ff',
							'on-secondary': '#1a1a1a',
							background: '#f5f0e8',
							'on-surface-variant': '#4a4a4a',
							'surface-container': '#eee9e0',
							outline: '#1a1a1a',
							'secondary-fixed': '#ffdad6',
							'surface-container-lowest': '#ffffff',
							'error-container': '#ffdad6',
							error: '#cc0000',
							'on-error': '#ffffff',
							'outline-variant': '#d0cbc3',
							'inverse-on-surface': '#f5f0e8',
							'on-secondary-fixed': '#1a1a1a',
							'on-tertiary-fixed-variant': '#1a1a1a',
							'on-background': '#1a1a1a',
							secondary: '#e63b2e',
							'tertiary-container': '#d6e3ff',
							'on-primary-fixed': '#1a1a1a',
							'surface-container-highest': '#e2ddd4',
							'tertiary-fixed-dim': '#a8c6ff',
							'on-primary': '#ffffff',
							'surface-bright': '#faf7f2',
							'primary-fixed': '#ffcc00',
							'secondary-fixed-dim': '#ffb3ab',
							'surface-container-low': '#f2ede5',
							'inverse-primary': '#f5f0e8',
							'on-primary-container': '#1a1a1a',
							'primary-container': '#ffcc00',
							'surface-container-high': '#e8e3da',
							'surface-tint': '#1a1a1a',
							'on-tertiary': '#ffffff',
							surface: '#f5f0e8',
							'on-secondary-fixed-variant': '#1a1a1a',
							'surface-variant': '#e8e3da',
						},
						borderRadius: {
							DEFAULT: '0.125rem',
							lg: '0.25rem',
							xl: '0.5rem',
							full: '0.75rem',
						},
						spacing: {
							'container-padding-desktop': '40px',
							unit: '8px',
							'stack-gap': '32px',
							'container-padding-mobile': '20px',
							'grid-gutter': '24px',
						},
						fontFamily: {
							'body-lg': ['Inter', 'sans-serif'],
							'label-caps': ['JetBrains Mono', 'monospace'],
							'headline-lg': ['Hanken Grotesk', 'sans-serif'],
							'body-md': ['Inter', 'sans-serif'],
							'display-clock': ['JetBrains Mono', 'monospace'],
							'headline-md': ['Hanken Grotesk', 'sans-serif'],
							'display-clock-mobile': ['JetBrains Mono', 'monospace'],
							headline: ['Space Grotesk'],
							display: ['Space Grotesk'],
							body: ['Inter'],
							label: ['Space Grotesk'],
						},
						fontSize: {
							'body-lg': ['18px', { lineHeight: '28px', fontWeight: '400' }],
							'label-caps': [
								'12px',
								{
									lineHeight: '16px',
									letterSpacing: '0.15em',
									fontWeight: '600',
								},
							],
							'headline-lg': [
								'32px',
								{
									lineHeight: '40px',
									letterSpacing: '-0.02em',
									fontWeight: '700',
								},
							],
							'body-md': ['16px', { lineHeight: '24px', fontWeight: '400' }],
							'display-clock': [
								'100px',
								{
									lineHeight: '1',
									letterSpacing: '-0.05em',
									fontWeight: '700',
								},
							],
							'headline-md': [
								'24px',
								{
									lineHeight: '32px',
									letterSpacing: '-0.01em',
									fontWeight: '600',
								},
							],
							'display-clock-mobile': [
								'48px',
								{ lineHeight: '1', fontWeight: '700' },
							],
						},
					},
				},
			};
		</script>
		<style>
			.precision-grid {
				background-image: radial-gradient(
					circle at 1px 1px,
					rgba(0, 74, 198, 0.05) 1px,
					transparent 0
				);
				background-size: 40px 40px;
			}
			.glass-card {
				background: rgba(255, 255, 255, 0.6);
				backdrop-filter: blur(16px);
				-webkit-backdrop-filter: blur(16px);
				transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
			}
			.dark .glass-card {
				background: rgba(11, 28, 48, 0.4);
			}
			.glass-card:hover {
				background: rgba(255, 255, 255, 0.85);
				transform: translateY(-4px);
				box-shadow: 0 20px 40px -15px rgba(0, 74, 198, 0.08);
			}
			.digital-glow-primary {
				text-shadow: 0 0 20px rgba(85, 93, 101, 0.15);
			}
			.digital-glow-secondary {
				text-shadow: 0 0 20px rgba(70, 95, 137, 0.15);
			}
			.digital-glow-tertiary {
				text-shadow: 0 0 20px rgba(150, 68, 0, 0.2);
			}
		</style>
	</head>
	<body
		class="bg-background text-on-background font-body-md transition-colors duration-300 precision-grid min-h-screen"
	>
		<!-- TopAppBar -->
		<header
			class="fixed top-0 w-full z-50 flex justify-between items-center px-container-padding-mobile md:px-container-padding-desktop py-4 bg-white/80 dark:bg-inverse-surface/80 backdrop-blur-xl border-b border-outline-variant/10"
		>
			<div class="flex items-center gap-2">
				<div
					class="w-8 h-8 bg-primary rounded-lg flex items-center justify-center"
				>
					<span class="material-symbols-outlined text-white text-[20px]"
						>schedule</span
					>
				</div>
				<span
					class="font-headline-md text-xl font-bold tracking-tighter text-on-surface"
					>Clockap</span
				>
			</div>
			<div class="flex items-center gap-4">
				<button
					class="flex items-center gap-2 px-5 py-2.5 bg-primary text-on-primary font-medium rounded-lg hover:bg-primary-container transition-all active:scale-95 shadow-sm shadow-primary/20"
				>
					<span class="material-symbols-outlined text-[20px]">add</span>
					<span class="">Add Clock</span>
				</button>
				<button
					class="p-2.5 text-on-surface-variant hover:bg-surface-container rounded-lg transition-colors border border-outline-variant/10"
				>
					<span class="material-symbols-outlined">light_mode</span>
				</button>
			</div>
		</header>
		<main
			class="pt-32 pb-32 px-container-padding-mobile md:px-container-padding-desktop max-w-[1200px] mx-auto"
		>
			<div class="mb-16">
				<h1 class="font-headline-lg text-headline-lg text-on-surface mb-3">
					TIME MANAGEMENT
				</h1>
			</div>
			<!--  Clock Grid -->
			<div class="flex flex-col gap-stack-gap">
				<!-- analog Clock -->
				<div
					class="glass-card p-10 rounded-xl border border-outline-variant/30 group relative"
					id="analog-clock"
				>
					<div class="flex justify-between items-start mb-6">
						<div>
							<div class="flex items-center gap-2 mb-1">
								<span
									class="w-2.5 h-2.5 rounded-full bg-primary animate-pulse"
								></span>
								<span
									class="font-label-caps text-label-caps text-primary uppercase"
									>LONDON, UK</span
								>
							</div>
							<div
								class="mt-4 p-3 rounded-lg bg-surface-container-low/50 border border-outline-variant/10 inline-block"
							>
								<p
									class="text-[10px] text-on-surface-variant mb-0.5 tracking-widest font-label-caps"
								>
									DATE
								</p>
								<p class="font-bold text-sm">Thursday, May 23</p>
							</div>
						</div>
						<label class="inline-flex items-center cursor-pointer">
							<input class="sr-only peer" type="checkbox" />
						</label>
					</div>
					<div class="flex flex-col items-center justify-center py-4">
						<div
							class="relative w-64 h-64 flex items-center justify-center rounded-full"
						>
							<!-- Outer Ring / Depth -->
							<div
								class="absolute inset-0 rounded-full border-4 border-primary/10 bg-gradient-to-b from-white/50 to-transparent shadow-inner"
							></div>
							<!-- Refined Markers -->
							<div
								class="absolute inset-2 rounded-full border border-primary/5"
							></div>
							<div class="absolute inset-0 p-2">
								<div class="relative w-full h-full">
									<!-- Hour Markers (1-12) -->
									<div class="absolute inset-0 flex justify-center items-start">
										<div
											class="w-1.5 h-4 bg-primary rounded-full shadow-sm"
										></div>
									</div>
									<div
										class="absolute inset-0 flex justify-center items-start rotate-[30deg]"
									>
										<div class="w-0.5 h-2 bg-primary/30 rounded-full"></div>
									</div>
									<div
										class="absolute inset-0 flex justify-center items-start rotate-[60deg]"
									>
										<div class="w-0.5 h-2 bg-primary/30 rounded-full"></div>
									</div>
									<div
										class="absolute inset-0 flex justify-center items-start rotate-[90deg]"
									>
										<div
											class="w-1.5 h-4 bg-primary rounded-full shadow-sm"
										></div>
									</div>
									<div
										class="absolute inset-0 flex justify-center items-start rotate-[120deg]"
									>
										<div class="w-0.5 h-2 bg-primary/30 rounded-full"></div>
									</div>
									<div
										class="absolute inset-0 flex justify-center items-start rotate-[150deg]"
									>
										<div class="w-0.5 h-2 bg-primary/30 rounded-full"></div>
									</div>
									<div
										class="absolute inset-0 flex justify-center items-start rotate-[180deg]"
									>
										<div
											class="w-1.5 h-4 bg-primary rounded-full shadow-sm"
										></div>
									</div>
									<div
										class="absolute inset-0 flex justify-center items-start rotate-[210deg]"
									>
										<div class="w-0.5 h-2 bg-primary/30 rounded-full"></div>
									</div>
									<div
										class="absolute inset-0 flex justify-center items-start rotate-[240deg]"
									>
										<div class="w-0.5 h-2 bg-primary/30 rounded-full"></div>
									</div>
									<div
										class="absolute inset-0 flex justify-center items-start rotate-[270deg]"
									>
										<div
											class="w-1.5 h-4 bg-primary rounded-full shadow-sm"
										></div>
									</div>
									<div
										class="absolute inset-0 flex justify-center items-start rotate-[300deg]"
									>
										<div class="w-0.5 h-2 bg-primary/30 rounded-full"></div>
									</div>
									<div
										class="absolute inset-0 flex justify-center items-start rotate-[330deg]"
									>
										<div class="w-0.5 h-2 bg-primary/30 rounded-full"></div>
									</div>
								</div>
							</div>
							<!-- Elegant 12 Marker -->
							<div class="absolute top-6 flex flex-col items-center">
								<span
									class="font-label-caps text-primary font-bold text-[12px] tracking-widest"
									>12</span
								>
							</div>
							<div
								class="absolute right-6 top-1/2 -translate-y-1/2 flex items-center"
							>
								<span
									class="font-label-caps text-primary font-bold text-[12px] tracking-widest"
									>3</span
								>
							</div>
							<div
								class="absolute bottom-6 left-1/2 -translate-x-1/2 flex flex-col items-center"
							>
								<span
									class="font-label-caps text-primary font-bold text-[12px] tracking-widest"
									>6</span
								>
							</div>
							<div
								class="absolute left-6 top-1/2 -translate-y-1/2 flex items-center"
							>
								<span
									class="font-label-caps text-primary font-bold text-[12px] tracking-widest"
									>9</span
								>
							</div>
							<!-- Hour Hand (Tapered) -->
							<div
								class="absolute w-2 h-20 bg-primary rounded-full origin-bottom -translate-y-10 rotate-[330deg] transition-transform duration-300 shadow-lg"
							></div>
							<!-- Minute Hand (Tapered) -->
							<div
								class="absolute w-1.5 h-24 bg-secondary rounded-full origin-bottom -translate-y-12 rotate-[352deg] transition-transform duration-300 shadow-md"
							></div>
							<!-- Second Hand (Thin + Accent) -->
							<div
								class="absolute w-0.5 h-28 bg-tertiary rounded-full origin-bottom -translate-y-14 rotate-[180deg] transition-transform duration-300"
							></div>
							<!-- Polished Center Pin -->
							<div
								class="w-4 h-4 bg-white border-2 border-on-surface rounded-full z-10 shadow-md flex items-center justify-center"
							>
								<div class="w-1.5 h-1.5 bg-on-surface rounded-full"></div>
							</div>
						</div>
					</div>
				</div>
				<!-- flip Clock Card -->
				<div
					class="glass-card p-10 rounded-xl border border-outline-variant/30 group relative"
					id="flip-clock"
				>
					<div class="flex justify-between items-start mb-6">
						<div>
							<div class="flex items-center gap-2 mb-1">
								<span class="w-2.5 h-2.5 rounded-full bg-secondary"></span>
								<span
									class="font-label-caps text-label-caps text-secondary uppercase"
									>TOKYO, JP</span
								>
							</div>
							<div
								class="mt-4 p-3 rounded-lg bg-surface-container-low/50 border border-outline-variant/10 inline-block"
							>
								<p
									class="text-[10px] text-on-surface-variant mb-0.5 tracking-widest font-label-caps"
								>
									DATE
								</p>
								<p class="font-bold text-sm">Thursday, May 23</p>
							</div>
						</div>
						<label class="inline-flex items-center cursor-pointer">
							<input class="sr-only peer" type="checkbox" />
							<div
								class="relative w-20 h-10 bg-gray-200 rounded-full peer-focus:outline-none transition-colors duration-300 peer peer-checked:bg-secondary/80"
							>
								<div
									class="absolute top-1 left-1 bg-white w-8 h-8 rounded-full shadow transition-transform duration-300 peer-checked:translate-x-10 flex items-center justify-center font-semibold text-[10px] text-gray-700"
								>
									<span class="">12-h</span>
								</div>
							</div>
						</label>
					</div>
					<div class="flex flex-col items-center justify-center py-4">
						<div class="flex gap-4 items-center">
							<div class="flex gap-1">
								<div
									class="w-20 h-28 bg-secondary text-on-primary rounded-lg flex items-center justify-center text-5xl font-bold relative overflow-hidden shadow-lg"
								>
									<div
										class="absolute inset-0 border-b border-black/20 h-1/2"
									></div>
									<span class="">1</span>
								</div>
								<div
									class="w-20 h-28 bg-secondary text-on-primary rounded-lg flex items-center justify-center text-5xl font-bold relative overflow-hidden shadow-lg"
								>
									<div
										class="absolute inset-0 border-b border-black/20 h-1/2"
									></div>
									<span class="">9</span>
								</div>
							</div>
							<div class="text-secondary text-4xl font-bold animate-pulse">
								:
							</div>
							<div class="flex gap-1">
								<div
									class="w-20 h-28 bg-secondary text-on-primary rounded-lg flex items-center justify-center text-5xl font-bold relative overflow-hidden shadow-lg"
								>
									<div
										class="absolute inset-0 border-b border-black/20 h-1/2"
									></div>
									<span class="">4</span>
								</div>
								<div
									class="w-20 h-28 bg-secondary text-on-primary rounded-lg flex items-center justify-center text-5xl font-bold relative overflow-hidden shadow-lg"
								>
									<div
										class="absolute inset-0 border-b border-black/20 h-1/2"
									></div>
									<span class="">5</span>
								</div>
							</div>
							<div class="flex items-center ml-2">
								<div
									class="w-20 h-28 bg-secondary text-on-primary rounded-lg flex items-center justify-center text-4xl font-bold relative overflow-hidden shadow-lg"
								>
									<div
										class="absolute inset-0 border-b border-black/20 h-1/2"
									></div>
									<span class="">PM</span>
								</div>
							</div>
						</div>
					</div>
				</div>
				<!-- digital Clock Card -->
				<div
					class="glass-card p-10 rounded-xl border border-outline-variant/30 group relative"
					id="digital"
				>
					<div class="flex justify-between items-start mb-6">
						<div>
							<div class="flex items-center gap-2 mb-1">
								<span class="w-2.5 h-2.5 rounded-full bg-tertiary"></span>
								<span
									class="font-label-caps text-label-caps text-tertiary uppercase"
									>NEW YORK, US</span
								>
							</div>
							<div
								class="mt-4 p-3 rounded-lg bg-surface-container-low/50 border border-outline-variant/10 inline-block"
							>
								<p
									class="text-[10px] text-on-surface-variant mb-0.5 tracking-widest font-label-caps"
								>
									DATE
								</p>
								<p class="font-bold text-sm">Thursday, May 23</p>
							</div>
						</div>
						<label class="inline-flex items-center cursor-pointer">
							<input class="sr-only peer" type="checkbox" />
							<div
								class="relative w-20 h-10 bg-gray-200 rounded-full peer-focus:outline-none transition-colors duration-300 peer peer-checked:bg-tertiary/80"
							>
								<div
									class="absolute top-1 left-1 bg-white w-8 h-8 rounded-full shadow transition-transform duration-300 peer-checked:translate-x-10 flex items-center justify-center font-semibold text-[10px] text-gray-700"
								>
									<span class="">12h</span>
								</div>
								<div
									class="absolute top-1 right-1 w-8 h-8 flex items-center justify-center font-semibold text-[10px] text-white opacity-0 peer-checked:opacity-100 transition-opacity duration-300"
								>
									24h
								</div>
							</div>
						</label>
					</div>
					<div class="flex flex-col items-center justify-center py-4">
						<div class="relative">
							<div
								class="font-display-clock text-display-clock text-on-surface opacity-[0.03] absolute inset-0 select-none flex justify-center tracking-tighter"
							>
								88:88:88 <span class="text-4xl ml-2">AM</span>
							</div>
							<div
								class="font-display-clock text-display-clock text-tertiary dark:text-tertiary-fixed-dim relative flex justify-center tracking-tighter digital-glow-tertiary"
							>
								06:45:30 <span class="text-4xl ml-2">AM</span>
							</div>
						</div>
					</div>
				</div>
			</div>
		</main>

		<script src="./src/models/ClockTime.js"></script>
	</body>
</html>
